name: paseo
concurrency:
  group: paseo-${{ github.actor }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      runner:
        description: runner
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
jobs:
  paseo:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/install-nix
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/nixpkgs
          fetch-depth: "5"
          path: repositories/nixpkgs
          token: ${{ secrets.TOKEN }}
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/torvox
          fetch-depth: "0"
          path: repositories/torvox
          token: ${{ secrets.TOKEN }}
      - uses: cachix/cachix-action@master
        timeout-minutes: 2
        continue-on-error: true
        with:
          name: ${{ secrets.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: actions/cache/restore@main
        id: cache
        with:
          path: |
            ~/.paseo
            ~/.pi/agent/sessions
            ~/.local/share/cortexkit/magic-context
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            paseo-state-${{ runner.os }}-${{ runner.arch }}-
      - run: |
          rm --force "$HOME/.config/nix/nix.conf"
          mkdir --parents "$HOME/.paseo" "$HOME/.pi/agent/skills" "$HOME/.pi/agent/extensions" "$HOME/.pi/agent/sessions" "$HOME/.config/cortexkit" "$HOME/.local/share/cortexkit/magic-context"
          nix profile add nixpkgs#openspec .#pi-wrapper
          cp .github/magic-context.jsonc ~/.config/cortexkit/magic-context.jsonc
          nix build --verbose --print-build-logs --print-out-paths --impure .#pi-agent-settings --out-link /tmp/pi-agent-settings && install -D --mode 0644 /tmp/pi-agent-settings ~/.pi/agent/settings.json && rm --force /tmp/pi-agent-settings
          nix build --verbose --print-build-logs --print-out-paths --impure .#pi-agent-mcp --out-link /tmp/pi-agent-mcp && install -D --mode 0644 /tmp/pi-agent-mcp ~/.config/mcp/mcp.json && rm --force /tmp/pi-agent-mcp
          cp --recursive .github/pi-opencode-zen ~/.pi/agent/extensions/pi-opencode-zen
          pushd ~/.pi/agent/extensions/pi-opencode-zen && npm install --yes && popd
          npm install --global --yes @getpaseo/cli
      - run: |
          npx skills@latest add mattpocock/skills --agent pi  --global --yes
          npx skills@latest add Fission-AI/OpenSpec --agent pi  --global --yes
          npx skills@latest add addyosmani/agent-skills --agent pi --global --yes
          export PATH="$ANDROID_HOME/platform-tools:$HOME/.pi/agent/npm/node_modules/@hypabolic/hypa-linux-x64/bin:$PATH"
          npm install --global --yes open-websearch
          paseo onboard --voice disable
          # timeout 15s python3 -c 'import os,pty,subprocess,time; m,s=pty.openpty(); p=subprocess.Popen(["paseo","onboard","--voice","disable"], stdin=s, stdout=s, stderr=s, start_new_session=True); os.close(s); time.sleep(2); os.close(m)' >/dev/null 2>&1 </dev/null
          tail --follow "$HOME/.paseo/daemon.log"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
      - if: always()
        run: paseo daemon stop
      - if: always()
        uses: actions/cache/save@main
        with:
          path: |
            ~/.paseo
            ~/.pi/agent/sessions
            ~/.local/share/cortexkit/magic-context
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
