name: paseo
concurrency:
  group: paseo-${{ github.actor }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      runner:
        description: runner
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
jobs:
  paseo:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/install-nix
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/nixpkgs
          fetch-depth: "5"
          path: repositories/nixpkgs
          token: ${{ secrets.TOKEN }}
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/torvox
          fetch-depth: "0"
          path: repositories/torvox
          token: ${{ secrets.TOKEN }}
      - uses: cachix/cachix-action@master
        timeout-minutes: 2
        continue-on-error: true
        with:
          name: ${{ secrets.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: actions/cache/restore@main
        id: cache
        with:
          path: |
            ~/.paseo
            ~/.config/opencode
            ~/.local/share/opencode
            ~/.local/share/cortexkit/magic-context
            ~/.pi/agent/sessions
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            paseo-state-${{ runner.os }}-${{ runner.arch }}-
      - run: |
          rm --force "$HOME/.config/nix/nix.conf"
          mkdir --parents "$HOME/.paseo" "$HOME/.config/opencode" "$HOME/.local/share/opencode/skills" "$HOME/.local/share/cortexkit/magic-context" "$HOME/.pi/agent/sessions" "$HOME/.pi/agent/skills" "$HOME/.config/opencode/commands"
          nix profile add nixpkgs#bun nixpkgs#uv nixpkgs#openspec .#opencode-with-config .#pi-with-config
          cp .github/magic-context.jsonc ~/.config/opencode/magic-context.jsonc
          nix build --verbose --print-build-logs --print-out-paths --impure .#pi-agent-settings --out-link /tmp/pi-agent-settings && install -D --mode 0644 /tmp/pi-agent-settings ~/.pi/agent/settings.json && rm --force /tmp/pi-agent-settings
          nix build --verbose --print-build-logs --print-out-paths --impure .#pi-agent-mcp --out-link /tmp/pi-agent-mcp && install -D --mode 0644 /tmp/pi-agent-mcp ~/.config/mcp/mcp.json && rm --force /tmp/pi-agent-mcp
          npm install --global --yes @getpaseo/cli
      - run: |
          npx skills@latest add mattpocock/skills --agent opencode -g -y
          npm install --global --yes opencode-goal-plugin
          mkdir /tmp/OpenSpec && pushd /tmp/OpenSpec && openspec init --tools opencode --force && popd && cp --recursive /tmp/OpenSpec/.opencode/skills/* ~/.config/opencode/skills/ && cp --recursive /tmp/OpenSpec/.opencode/commands/* ~/.config/opencode/commands/ && rm --recursive --force /tmp/OpenSpec
          git clone --depth 1 --single-branch https://github.com/uditgoenka/autoresearch.git /tmp/autoresearch && cp --recursive /tmp/autoresearch/.opencode/skills/autoresearch ~/.config/opencode/skills/ && cp --recursive /tmp/autoresearch/.opencode/commands/autoresearch*.md ~/.config/opencode/commands/ && rm --recursive --force /tmp/autoresearch
          git clone --depth 1 --single-branch https://github.com/PabloNAX/ultracode-skill.git /tmp/ultracode-skill && cp --recursive /tmp/ultracode-skill/ultracode ~/.config/opencode/skills/ && rm --recursive --force /tmp/ultracode-skill
          mkdir --parents "${HOME}/.config/opencode/skills/ultra-goal" && curl --location "https://raw.githubusercontent.com/Azure99/ultra-goal/main/skills/ultra-goal/SKILL.md" --output "${HOME}/.config/opencode/skills/ultra-goal/SKILL.md"
          export PATH="$ANDROID_HOME/platform-tools:$PATH"
          npm install -g open-websearch
          ln --symbolic ~/.config/opencode/skills/* ~/.pi/agent/skills/
          mkdir --parents "${HOME}/.pi/agent/git/github.com/ravshansbox" && git clone --depth 1 --single-branch https://github.com/ravshansbox/pi-opencode-zen.git ~/.pi/agent/git/github.com/ravshansbox/pi-opencode-zen && pushd ~/.pi/agent/git/github.com/ravshansbox/pi-opencode-zen && npm install --yes && popd
          # git -C "$HOME/.pi/agent/git/github.com/ravshansbox/pi-opencode-zen" apply "$(realpath .github/pi-opencode-zen.patch)"
          export PATH="$HOME/.pi/agent/npm/node_modules/@hypabolic/hypa-linux-x64/bin:$PATH"
          bunx oh-my-opencode-slim@latest install --no-tui --skills=yes --preset=opencode-go --companion=no --background-subagents=no --reset
          python3 -m pip install --user json5
          mkdir --parents "$HOME/.config/opencode" && python3 -c 'import os,re,json,urllib.request; import json5; u="https://raw.githubusercontent.com/alvinunreal/oh-my-opencode-slim/refs/heads/master/docs/opencode-zen-free-preset.md"; t=urllib.request.urlopen(u).read().decode("utf-8"); m=re.search(r"```(?:jsonc|json)\s*([\s\S]*?)\s*```", t, re.I); s=m.group(1) if m else t; d=json5.loads(s); d["autoUpdate"]=False; d.setdefault("interview", {})["autoOpenBrowser"]=False; p=os.path.expanduser("~/.config/opencode/oh-my-opencode-slim.jsonc"); open(p,"w",encoding="utf-8").write(json.dumps(d, ensure_ascii=False, indent=2)+"\n")'
          paseo onboard --voice disable
          # timeout 15s python3 -c 'import os,pty,subprocess,time; m,s=pty.openpty(); p=subprocess.Popen(["paseo","onboard","--voice","disable"], stdin=s, stdout=s, stderr=s, start_new_session=True); os.close(s); time.sleep(2); os.close(m)' >/dev/null 2>&1 </dev/null
          tail --follow "$HOME/.paseo/daemon.log"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENCODE_DISABLE_DEFAULT_PLUGINS: "true"
      - if: always()
        run: paseo daemon stop
      - if: always()
        uses: actions/cache/save@main
        with:
          path: |
            ~/.paseo
            ~/.config/opencode
            ~/.local/share/opencode
            ~/.local/share/cortexkit/magic-context
            ~/.pi/agent/sessions
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
