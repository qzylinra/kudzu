name: paseo
concurrency:
  group: paseo-${{ github.actor }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      runner:
        description: runner
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
jobs:
  paseo:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/install-nix
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/nixpkgs
          fetch-depth: "5"
          path: repositories/nixpkgs
          token: ${{ secrets.TOKEN }}
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/torvox
          fetch-depth: "0"
          path: repositories/torvox
          token: ${{ secrets.TOKEN }}
      - uses: cachix/cachix-action@master
        timeout-minutes: 2
        continue-on-error: true
        with:
          name: ${{ secrets.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: actions/cache/restore@main
        id: cache
        with:
          path: |
            ~/.paseo
            ~/.openinterpreter
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            paseo-state-${{ runner.os }}-${{ runner.arch }}-
      - run: |
          rm --force "$HOME/.config/nix/nix.conf"
          mkdir --parents "$HOME/.paseo" "$HOME/.openinterpreter"
          curl -fsSL https://www.openinterpreter.com/install | sh
          nix profile add nixpkgs#openspec .#openinterpreter-wrapper
          nix build --verbose --print-build-logs --print-out-paths --impure .#openinterpreter-config --out-link /tmp/openinterpreter-config && install -D --mode 0644 /tmp/openinterpreter-config ~/.openinterpreter/config.toml && rm --force /tmp/openinterpreter-config
          npm install --global --yes @getpaseo/cli
      - run: |
          npx skills@latest add mattpocock/skills --agent cline --global --yes
          npx skills@latest add addyosmani/agent-skills --agent cline --global --yes
          npx skills@latest add Fission-AI/OpenSpec --agent cline --global --yes
          git clone --depth 1 --single-branch https://github.com/uditgoenka/autoresearch.git /tmp/autoresearch && cp --recursive /tmp/autoresearch/.agents/skills/autoresearch ~/.agents/skills/ && rm --recursive --force /tmp/autoresearch
          git clone --depth 1 --single-branch https://github.com/PabloNAX/ultracode-skill.git /tmp/ultracode-skill && cp --recursive /tmp/ultracode-skill/ultracode ~/.agents/skills/ && rm --recursive --force /tmp/ultracode-skill
          mkdir --parents "${HOME}/.agents/skills/ultra-goal" && curl --location "https://raw.githubusercontent.com/Azure99/ultra-goal/main/skills/ultra-goal/SKILL.md" --output "${HOME}/.agents/skills/ultra-goal/SKILL.md"
          export PATH="$ANDROID_HOME/platform-tools:$PATH"
          npm install --global --yes open-websearch
          pushd .github/zen
          CGO_ENABLED=0 go build -o zen .
          ./zen &
          popd
          paseo onboard --voice disable
          # timeout 15s python3 -c 'import os,pty,subprocess,time; m,s=pty.openpty(); p=subprocess.Popen(["paseo","onboard","--voice","disable"], stdin=s, stdout=s, stderr=s, start_new_session=True); os.close(s); time.sleep(2); os.close(m)' >/dev/null 2>&1 </dev/null
          tail --follow "$HOME/.paseo/daemon.log"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          CLAUDE_CODE_USE_OPENAI": "1"
          OPENAI_BASE_URL: "http://127.0.0.1:8787/v1"
          OPENAI_API_KEY: "sk-key-zen"
          OPENAI_MODEL: "deepseek-v4-flash-free"
      - if: always()
        run: |
          paseo daemon stop
          rm --recursive --force ~/.openinterpreter/config.toml ~/.openinterpreter/installation_id ~/.openinterpreter/packages ~/.openinterpreter/shell_snapshots ~/.openinterpreter/skills ~/.openinterpreter/tmp
      - if: always()
        uses: actions/cache/save@main
        with:
          path: |
            ~/.paseo
            ~/.openinterpreter
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
