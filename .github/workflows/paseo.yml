name: paseo
concurrency:
  group: paseo-${{ github.actor }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      runner:
        description: runner
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
jobs:
  paseo:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/install-nix
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/nixpkgs
          fetch-depth: "5"
          path: repositories/nixpkgs
          token: ${{ secrets.TOKEN }}
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/torvox
          fetch-depth: "0"
          path: repositories/torvox
          token: ${{ secrets.TOKEN }}
      - uses: cachix/cachix-action@master
        timeout-minutes: 2
        continue-on-error: true
        with:
          name: ${{ secrets.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: actions/cache/restore@main
        id: cache
        with:
          path: |
            ~/.paseo
            ~/.factory/sessions
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            paseo-state-${{ runner.os }}-${{ runner.arch }}-
      - run: |
          rm --force "$HOME/.config/nix/nix.conf"
          mkdir --parents "$HOME/.paseo"
          curl -fsSL https://app.factory.ai/cli | sh
          nix build --verbose --print-build-logs --print-out-paths --impure .#factory-settings --out-link /tmp/factory-settings && install -D --mode 0644 /tmp/factory-settings ~/.factory/settings.json && rm --force /tmp/factory-settings
          nix build --verbose --print-build-logs --print-out-paths --impure .#factory-mcp --out-link /tmp/factory-mcp && install -D --mode 0644 /tmp/factory-mcp ~/.factory/mcp.json && rm --force /tmp/factory-mcp
          npm install --global --yes @getpaseo/cli
      - run: |
          # droid plugin marketplace add https://github.com/Factory-AI/factory-plugins
          # droid plugin install droid-control@factory-plugins
          # droid plugin install autoresearch@factory-plugins
          npx skills@latest add mattpocock/skills --agent droid  --global --yes
          npx skills@latest add Fission-AI/OpenSpec --agent droid  --global --yes
          npx skills@latest add addyosmani/agent-skills --agent droid --global --yes
          export PATH="$ANDROID_HOME/platform-tools:$PATH"
          npm install --global --yes open-websearch
          pushd .github/zen
          CGO_ENABLED=0 go build -o zen .
          ./zen &
          popd
          paseo onboard --voice disable
          # timeout 15s python3 -c 'import os,pty,subprocess,time; m,s=pty.openpty(); p=subprocess.Popen(["paseo","onboard","--voice","disable"], stdin=s, stdout=s, stderr=s, start_new_session=True); os.close(s); time.sleep(2); os.close(m)' >/dev/null 2>&1 </dev/null
          tail --follow "$HOME/.paseo/daemon.log"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          FACTORY_DROID_AUTO_UPDATE_ENABLED: "false"
          FACTORY_AIRGAP_ENABLED: "true"
          FACTORY_API_KEY: "x"
      - if: always()
        run: paseo daemon stop
      - if: always()
        uses: actions/cache/save@main
        with:
          path: |
            ~/.paseo
            ~/.factory/sessions
          key: paseo-state-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
